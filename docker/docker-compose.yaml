services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mshop-data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      keycloak-network:
    profiles:
      - "keycloak"
      - "db"
      - "all"
      
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: keycloak
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak_db
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: root
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    command:
      - start-dev
    depends_on:
      - mysql
    networks:
      keycloak-network:
    profiles:
      - "keycloak"
      - "all"

volumes:
  mshop-data:
    name: mshop-data

networks:
  keycloak-network:
    name: keycloak-network
